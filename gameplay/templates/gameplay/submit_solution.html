{% extends 'gameplay/base.html' %}

{% block content %}
<div class="card" style="max-width: 700px; margin: 40px auto; border-top: 5px solid #3498db;">
    <h2>Help {{ problem.submitted_by.username }}</h2>
    
    <div style="background: #f8f9fa; padding: 15px; border-radius: 5px; border-left: 4px solid #f39c12; margin-bottom: 20px;">
        <strong style="color: #2c3e50;">The Problem:</strong><br>
        <span style="font-size: 1.1em;">{{ problem.description }}</span>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold;">{{ form.solution_description.label }}</label><br>
            {{ form.solution_description }}
        </div>

        <div style="margin-bottom: 25px;">
            <label style="font-weight: bold;">{{ form.solution_image.label }}</label><br>
            {{ form.solution_image }}
        </div>

        <button type="submit" style="background: #27ae60; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 1.1em; width: 100%;">
            Submit Solution
        </button>
        
        <div style="text-align: center; margin-top: 15px;">
            <a href="{% url 'problems_page' %}" style="color: #7f8c8d; text-decoration: none;">Cancel and go back</a>
        </div>
    </form>
</div>
{% endblock %}
