{% extends 'gameplay/base.html' %}

{% block content %}
<style>
    .schedule-card {
        border: none;
        box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        border-radius: 12px;
        padding: 40px;
        background: #fff;
        margin-bottom: 40px;
    }
    .schedule-title {
        color: #4b5563;
        font-size: 1.4rem;
        font-weight: 700;
        margin-bottom: 25px;
        margin-top: 0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
</style>
<div class="form-container">
    <div class="schedule-card" style="border-left: 5px solid #f39c12;">
        <h2 class="schedule-title" style="color: #2c3e50; margin-top: 0;">Edit Department: {{ department.name }}</h2>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            
            <div style="margin-top: 20px;">
                <button type="submit" class="btn-primary" style="background-color: #e67e22; width: 100%;">
                    💾 Update Department
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
<style>
  #quill-editor {
    min-height: 250px;
    font-size: 1rem;
    font-family: inherit;
    background-color: #fff;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill-blot-formatter@1.0.5/dist/quill-blot-formatter.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    Quill.register('modules/blotFormatter', QuillBlotFormatter.default);
    var textarea = document.getElementById('id_description');
    if (textarea) {
        var editorContainer = document.createElement('div');
        editorContainer.id = 'quill-editor';
        textarea.parentNode.insertBefore(editorContainer, textarea);
        textarea.style.display = 'none';

        var quill = new Quill('#quill-editor', {
          theme: 'snow',
          modules: {
            blotFormatter: {},
            toolbar: [
              [{ 'header': [1, 2, 3, false] }],
              ['bold', 'italic', 'underline'],
              ['image', 'link', 'blockquote'],
              [{ 'list': 'ordered'}, { 'list': 'bullet' }]
            ]
          }
        });

        // Load existing content
        quill.root.innerHTML = textarea.value;

        // Sync before submit
        var form = textarea.closest('form');
        form.addEventListener('submit', function() {
          textarea.value = quill.root.innerHTML;
        });

        // Allow easy deletion of images by clicking and selecting them
        quill.root.addEventListener('click', function(ev) {
            if (ev.target && ev.target.tagName === 'IMG') {
                let blot = Quill.find(ev.target);
                if (blot) {
                    let index = quill.getIndex(blot);
                    quill.setSelection(index, 1);
                }
            }
        });
    }
  });
</script>
{% endblock %}
